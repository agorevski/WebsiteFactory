sections:
  - id: visit-details
    type: proof
    eyebrow: Quick details
    title: What patients need before they call
    summary: The essentials are visible up front, so the page feels like a practical local dental site instead of a long brochure.
    stats:
      - label: Neighborhood
        value: Madrona
      - label: Schedule
        value: Mon-Thu
      - label: New patients
        value: Referral-based
      - label: Contact
        value: Call office
  - id: services
    type: services
    eyebrow: Care paths
    title: Start with the visit you need
    summary: Official site content supports general dentistry, teeth whitening, orthodontic aligners, and family-focused ongoing care.
    items:
      - title: General dentistry
        description: Routine exams, cleanings, dental care planning, and prevention-focused guidance for long-term oral health.
      - title: Whitening conversations
        description: Teeth whitening information for patients with stained, dull, or discolored teeth who want a brighter smile.
      - title: Orthodontic aligners
        description: Clear aligner conversations for patients exploring removable trays that gradually shift teeth into alignment.
      - title: Family dental care
        description: Supportive visits for neighborhood patients who want comfortable, personal care and clear next steps.
    actions:
      - label: Call about services
        href: "tel:+12063245400"
        variant: primary
  - id: cosmetic-restorative
    type: services
    eyebrow: Smile goals
    title: Cosmetic and restorative topics to discuss
    summary: The official metadata and public service information mention cosmetic dentistry, whitening, implants, veneers, and dental care.
    items:
      - title: Cosmetic dentistry
        description: A place to discuss whitening, veneers, and smile goals with the office before deciding on a treatment path.
      - title: Implant-related care
        description: Public service information references dental implants; call the office to confirm the right consultation or referral path.
      - title: Veneers
        description: Veneers are listed in public practice information for patients considering cosmetic changes to visible teeth.
      - title: Digital planning questions
        description: Ask the office which imaging or scanning tools are used for your visit type and treatment conversation.
  - id: process
    type: process
    eyebrow: Appointment flow
    title: A simpler path from question to visit
    summary: The call-to-action is intentionally phone-first because the official contact page asks patients to call for appointments.
    steps:
      - title: Call with your visit goal
        description: Share whether you need a checkup, whitening information, aligner guidance, restorative discussion, or help choosing a visit type.
      - title: Confirm availability and fit
        description: The office can confirm current appointment timing, referral requirements for new patients, records, and insurance questions.
      - title: Review options before treatment
        description: The dental team can explain findings, choices, and follow-up steps before a treatment plan moves forward.
  - id: comfort
    type: content
    eyebrow: Patient experience
    title: Make the page feel calm, not crowded
    summary: The content is grouped around patient decisions so the UX supports scanning, comparison, and a confident phone call.
    items:
      - title: Friendly neighborhood framing
        description: Copy should describe the office as personal and community-focused without making unsupported guarantees.
      - title: Clear expectations
        description: Appointment, referral, services, location, and hours details should be visible before patients reach the footer.
      - title: Review-safe trust language
        description: Public reviews reference comfort and professionalism, but the template summarizes themes instead of copying testimonials.
  - id: patient-info
    type: content
    eyebrow: Before you schedule
    title: Helpful questions for patient intake
    summary: Keep patient information practical and conservative so the page does not overpromise access, insurance participation, or clinical outcomes.
    items:
      - title: New-patient referrals
        description: The official contact page says new patients are accepted when referred by a current patient; call to confirm current policy.
      - title: Records and timing
        description: Ask what records, prior x-rays, medication details, or timing notes the office wants before the visit.
      - title: Insurance and billing
        description: The location page references insurance and billing policies; patients should confirm coverage details directly with the office.
  - id: location
    type: content
    eyebrow: Office location
    title: Visit the East Spring Street office
    summary: Madrona Family Dental is listed at 3306 East Spring Street in Seattle, WA 98122.
    items:
      - title: Address
        description: The office is located at 3306 East Spring Street, Seattle, WA 98122.
      - title: Office hours
        description: Official location information lists Monday through Thursday, 8:00 AM to 5:00 PM, with Friday through Sunday closed.
      - title: Contact path
        description: Call (206) 324-5400 to confirm appointments, directions, and current practice details.
  - id: faq
    type: faq
    eyebrow: FAQ
    title: Madrona dental questions
    questions:
      - question: Where is Madrona Family Dental located?
        answer: The office is listed at 3306 East Spring Street in Seattle, WA 98122.
      - question: What are the listed office hours?
        answer: Official location information lists Monday through Thursday from 8:00 AM to 5:00 PM, with Friday, Saturday, and Sunday closed.
      - question: How do new patients request an appointment?
        answer: The official contact page says new patients are accepted when referred by a current patient. Call (206) 324-5400 to confirm current availability.
      - question: Which services should this template highlight?
        answer: Official content supports general dentistry, teeth whitening, orthodontic aligners, and family-focused dental care. Public service information also references cosmetic dentistry, veneers, and implant-related care.
