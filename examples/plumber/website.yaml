    title: A repair workflow customers understand
    steps:
      - title: Triage the issue
        description: The dispatcher captures location, symptoms, urgency, and access details.
      - title: Inspect and quote
        description: A technician explains findings and presents clear repair or replacement options.
      - title: Complete and clean up
        description: Work is completed with photos, warranty details, and prevention tips.
